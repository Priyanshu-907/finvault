spring:
  datasource:
    url: jdbc:h2:mem:accountsdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        # H2 doesn't support PostgreSQL enums — use string mapping
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

eureka:
  client:
    enabled: false

